<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OI协会模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060810;--bg2:#0b0e18;--pnl:#0f1220;--pnl2:#161b2e;--bdr:#1c2240;
  --acc:#00ddb3;--gold:#ffc844;--red:#ff4466;--grn:#22dd88;--blue:#4499ff;
  --purple:#9966ff;--pink:#ff66aa;--orange:#ff8844;--txt:#d8e0f0;--dim:#5a6a88;--mut:#2a3350;
}
body{background:var(--bg);color:var(--txt);font-family:'Courier New','Fira Code',monospace;font-size:13px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0a0d16}
::-webkit-scrollbar-thumb{background:#1c2240;border-radius:3px}
button{font-family:inherit;cursor:pointer;transition:filter .15s}
button:hover{filter:brightness(1.15)}
input,select{font-family:inherit;outline:none}
.btn{padding:6px 14px;border-radius:7px;border:none;font-weight:700;font-size:11px;white-space:nowrap}
.btn-dis{opacity:.4;cursor:not-allowed!important;background:var(--mut)!important;color:var(--dim)!important}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.inp{background:var(--bg);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:6px 10px;font-size:12px;width:80px;text-align:center}
.card{background:var(--pnl);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:8px}
.grid{display:grid;gap:8px}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.flex{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.header{background:linear-gradient(135deg,var(--pnl),#101528);border-bottom:1px solid var(--bdr);padding:7px 16px;position:sticky;top:0;z-index:20}
.stat-bar{display:flex;gap:6px;padding:5px 16px;background:var(--pnl);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.stat{padding:2px 8px;border-radius:5px;display:flex;align-items:center;gap:4px;font-size:11px}
.tabs{display:flex;gap:1px;padding:3px 16px;background:var(--bg);border-bottom:1px solid var(--bdr);overflow-x:auto}
.tab{padding:5px 10px;border-radius:6px 6px 0 0;border:1px solid transparent;background:transparent;color:var(--dim);font-weight:400;font-size:11px}
.tab-active{border-color:var(--bdr);border-bottom-color:var(--pnl);background:var(--pnl);color:var(--acc);font-weight:700}
.main{padding:14px;max-width:1200px;margin:0 auto}
.warn-bar{background:rgba(255,136,68,.08);border-bottom:1px solid rgba(255,136,68,.2);padding:6px 16px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--pnl);border:1px solid var(--bdr);border-radius:14px;padding:20px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto}
.news-card{border-radius:10px;padding:14px;border-left:4px solid}
.progress{height:3px;background:var(--mut);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
#app{min-height:100vh}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* ═══ UTILS ═══ */
function Ru(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function cl(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function uid(){return Math.random().toString(36).substr(2,9)}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  if(children!=null){
    if(!Array.isArray(children))children=[children];
    children.forEach(c=>{
      if(c==null)return;
      if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(String(c)));
      else if(c instanceof Node)el.appendChild(c);
    });
  }
  return el;
}
function frag(children){const f=document.createDocumentFragment();(children||[]).forEach(c=>{if(c instanceof Node)f.appendChild(c);else if(c!=null)f.appendChild(document.createTextNode(String(c)))});return f}

const MO=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const TC=["#7dd3fc","#5eead4","#86efac","#fde68a","#fdba74","#fca5a5","#c4b5fd","#f9a8d4","#fb923c","#94a3b8"];

/* ═══ DATA ═══ */

  {id:"time_s",cat:"time",name:"闪电赛",icon:"⚡",desc:"时间-30%",ap:2,cost:100,fx:{timeM:.7,hangM:1.3,repB:1}},

  {id:"opening",cat:"evt",name:"开幕式",icon:"🎪",desc:"声誉+3",ap:3,cost:600,fx:{repB:3,partM:1.1}},

  {id:"invite",cat:"spec",name:"特邀选手",icon:"⭐",desc:"知名选手",ap:4,cost:800,fx:{repB:5,partM:1.1}},

const FCATS=[

  {id:"csjp_chu",name:"CSJ-P初赛",tier:0,bd:1,bp:7,dm:9,board:false},
  {id:"cssp_fu",name:"CSS-P复赛",tier:1,bd:2,bp:4,dm:10,board:false},
  {id:"csjp",name:"CSJ-P",tier:2,bd:3,bp:4,dm:11,board:false},

];
const JUDGES=[
  {id:"j0",name:"树莓派集群",mdl:"RPi 4B ×10",pow:1,mnt:200,upg:0,e:"🫐"},
  {id:"j1",name:"办公台式机",mdl:"i5-12400/16GB",pow:2,mnt:500,upg:3000,e:"🖥️"},
  {id:"j2",name:"专业工作站",mdl:"i7-13700K/64GB",pow:4,mnt:1000,upg:8000,e:"💻"},
  {id:"j3",name:"高性能服务器",mdl:"Xeon W-2495X/128GB",pow:7,mnt:2000,upg:20000,e:"🖲️"},
  {id:"j4",name:"数据中心节点",mdl:"EPYC 9654/256GB",pow:12,mnt:5000,upg:50000,e:"🏗️"},
  {id:"j5",name:"超算集群",mdl:"Dual EPYC 9754/512GB",pow:20,mnt:10000,upg:120000,e:"🔥"},
];
const TAGS=["Ad-Hoc","超纲","冷门"];
const SN=["张三","李四","王五","赵六","陈七","周八","吴九","郑十","钱十一","孙十二"];
const IN=["刘督察","陈巡视","黄监理","马专员","宋审核","高巡查","林督导","许监察"];
const IT=["初级巡视员","中级督察","高级监理","首席特派员"];

function mkS(){var nm=SN[Ru(0,SN.length-1)]+Ru(10,99),sk=Ru(2,10),qu=Ru(2,10),cap=Ru(2,5);return{id:uid(),nm:nm,sk:sk,qu:qu,cap:cap,used:0,cost:Math.round((sk*150+qu*200+cap*120)*(.85+Math.random()*.3)),asgn:[]}}
function mkI(){var nm=IN[Ru(0,IN.length-1)]+Ru(10,99),lv=Ru(0,3),ab=cl(lv*2+Ru(1,3),1,10),dil=cl(lv*2+Ru(0,3),1,10),sal=Math.round((ab*120+dil*80+lv*400)*(.9+Math.random()*.2));return{id:uid(),nm:nm,lv:lv,title:IT[lv],ab:ab,dil:dil,sal:sal,hire:sal*3}}

function cSt(tw){var hangR=.15,timeM=1,solvB=0,repB=0,partM=1,diffM=0,extraP=0,hangM=1,repMul=1,moneyB=0;
  (tw.floors||[]).forEach(function(f){var e=f.fx||{};if(e.hangR!==undefined)hangR=e.hangR;if(e.timeM)timeM=e.timeM;if(e.solvB)solvB+=e.solvB;if(e.repB)repB+=e.repB;if(e.partM)partM*=e.partM;if(e.diffM)diffM+=e.diffM;if(e.extraP)extraP+=e.extraP;if(e.hangM)hangM*=e.hangM;if(e.repMul)repMul*=e.repMul;if(e.moneyB)moneyB+=e.moneyB});
  return{hangR:hangR,timeM:timeM,solvB:solvB,repB:repB,partM:partM,diffM:diffM,extraP:extraP,hangM:hangM,repMul:repMul,moneyB:moneyB,totP:tw.bp+extraP,effD:cl(tw.bd+diffM,1,10)}}

function estP(tw,rep,bridges,towers){var st=cSt(tw);var br=bridges.find(function(b){return b.to===tw.id});var base;
  if(tw.tier<=1)base=Math.round(40*Math.pow(1.045,rep)-st.effD*3);
  else if(br){var fr=towers[br.from];var lp=(fr&&fr.lastResult)?fr.lastResult.part:Math.round(20*Math.pow(1.03,rep));base=Math.round(lp*br.pass);if(fr&&fr.suspended)base=Math.round(base*.3)}
  else base=Math.round(15*Math.pow(1.035,rep)-st.effD*2);
  var pe=br?cl(1-(br.price-50)/800,.3,1.3):cl(1-((tw.regPrice||50)-50)/800,.3,1.3);
  return Math.max(5,Math.round(base*pe*st.partM*(1+((tw.sites||1)-1)*.15)))}

function compCost(tw,part){var s=tw.sites||1;var pr=s*120,vr=s*200,vo=s*80,se=s*150,bo=tw.board?part*350:0;return{pr:pr,vr:vr,vo:vo,se:se,bo:bo,total:pr+vr+vo+se+bo}}
function trainCost(base,sites){return Math.round(base*(1+(sites-1)*.4))}
function calcEnd(g){var tp=g.results.reduce(function(s,r){return s+r.part},0);var rs=cl(g.rep/80,0,1),ms=cl(g.money/50000,-.5,1),ps=cl(tp/5000,0,1);var is=cl(g.inspectors.reduce(function(s,i){return s+i.ab},0)/20,0,.3);return{c:rs*.4+ms*.25+ps*.25+is*.1,tp:tp}}

function genNews(g){var msgs=[];var e=calcEnd(g);var tp=e.tp;
  if(g.money>300000)msgs.push({icon:"💰",c:"var(--red)",t:"网友热议",m:"CCF的报名费都去哪里了呢？怎么换了个马甲继续圈钱？"});
  else if(g.money>150000)msgs.push({icon:"💸",c:"var(--orange)",t:"社交媒体",m:"有人质疑新协会是否也在走CCF的老路。"});
  else if(g.money>80000)msgs.push({icon:"📰",c:"var(--gold)",t:"财经观察",m:"协会资金充裕，但部分选手抱怨费用偏高。"});
  else if(g.money<0)msgs.push({icon:"📉",c:"var(--red)",t:"破产预警",m:"协会已入不敷出！承办学校拿不到尾款。"});
  else if(g.money<2000)msgs.push({icon:"⚠️",c:"var(--orange)",t:"财务紧张",m:"资金见底，比赛能否如期举办令人担忧。"});
  if(g.rep>=70)msgs.push({icon:"🌟",c:"var(--grn)",t:"教育部通报",m:"新竞赛体系获广泛好评，'后CCF时代的标杆'。"});
  else if(g.rep>=50)msgs.push({icon:"👍",c:"var(--acc)",t:"家长论坛",m:"比赛组织不错，比CCF正规多了。"});
  else if(g.rep>=30)msgs.push({icon:"😐",c:"var(--gold)",t:"OI社区",m:"新协会还行吧，题目质量参差不齐。"});
  else if(g.rep>=15)msgs.push({icon:"👎",c:"var(--orange)",t:"知乎",m:"又一个割韭菜的竞赛组织？"});
  else msgs.push({icon:"💀",c:"var(--red)",t:"微博热搜",m:"#新协会比CCF还烂# 登上热搜。"});
  if(tp>10000)msgs.push({icon:"🎉",c:"var(--grn)",t:"里程碑",m:"累计"+tp+"人次参赛！"});
  else if(tp>3000)msgs.push({icon:"📊",c:"var(--blue)",t:"数据",m:"已有"+tp+"人次参赛。"});
  if(g.inspectors.length>=3)msgs.push({icon:"🕵️",c:"var(--purple)",t:"内部消息",m:"特派员团队初具规模。"});
  if(g.inspectors.length===0&&g.month>24)msgs.push({icon:"❓",c:"var(--orange)",t:"质疑",m:"至今无特派员，公平性谁保障？"});
  if(g.jIdx>=4)msgs.push({icon:"💻",c:"var(--blue)",t:"科技新闻",m:"评测系统达数据中心级别。"});
  if(g.jIdx===0&&g.month>36)msgs.push({icon:"🐌",c:"var(--red)",t:"吐槽",m:"还在用树莓派评测？？？"});
  if(e.c>=.7)msgs.push({icon:"✨",c:"var(--grn)",t:"评论",m:"也许正在见证传奇的诞生。"});
  else if(e.c<=.25)msgs.push({icon:"😰",c:"var(--red)",t:"评论",m:"按这趋势，恐怕结局不太好..."});
  return msgs}

var ENDINGS={bad:{title:"BAD ENDING",sub:"比CCF还糟糕",c:"#ff4466",e:"💀",t:"你的协会在骂声中倒闭了。信息学竞赛再次陷入空白期。"},neutral:{title:"NEUTRAL ENDING",sub:"勉强及格",c:"#ffc844",e:"😐",t:"协会运营了下来，但评价褒贬不一。"},good:{title:"GOOD ENDING",sub:"超越CCF的传奇",c:"#22dd88",e:"🏆",t:"你打造了公平高质量的竞赛体系！人们称你为\"OI之父\"。"}};

/* ═══ GAME STATE ═══ */
var G, screen, tab, selT, fp, bf, pp;

function initG(){
  return{month:0,year:2037,money:15000,ap:15,rep:15,jIdx:0,
    towers:{},bridges:[],
    setters:[mkS(),mkS(),mkS()],market:[mkS(),mkS(),mkS(),mkS()],
    inspectors:[],inspMkt:[mkI(),mkI(),mkI()],
    log:[],warnings:[],results:[],over:false,score:0,ending:"neutral"}}

function resetGame(){G=initG();screen="menu";tab="towers";selT=null;fp=null;bf=null;pp=null;render()}

/* ═══ GAME LOGIC ═══ */
function advanceMonth(){
  if(G.over)return;
  G.month++;var mo=G.month%12,yr=G.year+Math.floor(G.month/12);
  var ap=3+Math.floor(G.rep/10)+Object.values(G.towers).reduce(function(s,t){return s+Math.floor((t.floors||[]).length/2)},0);
  G.ap+=ap;
  var jAge=Math.floor(G.month/12);
  var jM=Math.round(JUDGES[G.jIdx].mnt*(1+jAge*.05));
  G.money-=jM;
  var iSal=G.inspectors.reduce(function(s,i){return s+i.sal},0);
  G.money-=iSal;
  var iRep=G.inspectors.reduce(function(s,i){return s+i.ab*.08+i.dil*.05},0);
  G.rep=+(G.rep+iRep).toFixed(1);
  if(G.rep>5)G.rep=Math.max(5,+(G.rep-.1).toFixed(1));
  if(G.money>30000)G.rep=Math.max(0,+(G.rep-((G.money-30000)/10000)*.3).toFixed(1));
  if(G.month%2===0){G.market=[];for(var i=0;i<Ru(3,6);i++)G.market.push(mkS());G.inspMkt=[];for(var i=0;i<Ru(2,4);i++)G.inspMkt.push(mkI())}

  // warnings
  G.warnings=[];
  Object.keys(G.towers).forEach(function(tid){
    var tw=G.towers[tid];if(tw.ranThisYear)return;
    var ml=((tw.schedMonth-mo)+12)%12;
    if(ml>0&&ml<=3){var st=cSt(tw);var pDone=(tw.problems||[]).filter(Boolean).length;var issues=[];
      if(pDone<st.totP)issues.push("题目"+pDone+"/"+st.totP);
      if(!tw.trained)issues.push("未培训");
      if(JUDGES[G.jIdx].pow<Math.ceil(tw.tier*1.2)+1)issues.push("算力不足");
      if(issues.length)G.warnings.push({tid:tid,name:tw.name,ml:ml,issues:issues});
      if(ml<=1&&issues.length)G.log.push({mo:G.month,yr:yr,msg:"⚠️ "+tw.name+"下月开赛未准备: "+issues.join(", ")})}});

  // run competitions
  Object.keys(G.towers).forEach(function(tid){
    var tw=G.towers[tid];
    if(tw.schedMonth!==mo||tw.ranThisYear)return;
    var st=cSt(tw);var pDone=(tw.problems||[]).filter(Boolean).length;
    var jPow=JUDGES[G.jIdx].pow;var minPow=Math.ceil(tw.tier*1.2)+1;
    if(pDone<st.totP||!tw.trained||jPow<minPow){
      G.rep=Math.max(0,G.rep-6);tw.suspended=true;tw.ranThisYear=true;
      G.log.push({mo:G.month,yr:yr,msg:"💀 "+tw.name+" 未准备好！声誉-6"});return}
    tw.suspended=false;var stats=cSt(tw);var jj=JUDGES[G.jIdx];
    var br=G.bridges.find(function(b){return b.to===tid});
    var base;
    if(tw.tier<=1)base=Math.round(40*Math.pow(1.045,G.rep)-stats.effD*3);
    else if(br){var fr=G.towers[br.from];var lp=(fr&&fr.lastResult)?fr.lastResult.part:Math.round(20*Math.pow(1.03,G.rep));base=Math.round(lp*br.pass);if(fr&&fr.suspended)base=Math.round(base*.3)}
    else base=Math.round(15*Math.pow(1.035,G.rep)-stats.effD*2);
    var pe=br?cl(1-(br.price-50)/800,.3,1.3):cl(1-((tw.regPrice||50)-50)/800,.3,1.3);
    var part=Math.max(5,Math.round(base*pe*stats.partM*(1+((tw.sites||1)-1)*.15)));
    var regP=br?br.price:(tw.regPrice||50);
    var grossRev=Math.round(part*regP*.9*(1+jj.pow*.03))+stats.moneyB;
    var costs=compCost(tw,part);var netRev=grossRev-costs.total;G.money+=netRev;
    var probs=(tw.problems||[]).filter(Boolean);

      if(t.lastResult){var r=t.lastResult;html+='<div style="background:var(--bg2);border-radius:8px;padding:10px;font-size:11px;margin-bottom:8px"><div style="font-weight:700;margin-bottom:4px;color:var(--gold)">📊 上次</div><div class="flex"><span>参赛<b style="color:var(--acc)">'+r.part+'</b></span><span>净收<b style="color:'+(r.rev>=0?'var(--grn)':'var(--red)')+'">¥'+r.rev+'</b></span><span>声誉<b style="color:'+(r.repCh>=0?'var(--grn)':'var(--red)') +'">'+(r.repCh>0?"+":"")+r.repCh+'</b></span></div>';
        if(r.tags&&r.tags.length)html+='<div style="margin-top:4px">'+r.tags.map(function(tg){return pillH("#"+(tg.idx+1)+tg.tag,"var(--red)")}).join("")+'</div>';
        html+='</div>'}

      // problems
      if(pp===selT&&!t.ranThisYear){
        html+='<div style="margin-top:6px;background:var(--bg2);border-radius:8px;padding:10px"><div style="font-weight:700;margin-bottom:6px;font-size:12px">📝 题目</div>';
        for(var i=0;i<st.totP;i++){
          var prob=(t.problems||[])[i];
          html+='<div class="flex" style="padding:4px 0;border-bottom:1px solid rgba(28,34,64,.07)"><span style="font-weight:700;min-width:24px;color:var(--dim);font-size:11px">#'+(i+1)+'</span>';
          if(prob){
            html+='<span style="color:var(--acc);font-weight:600;font-size:10px">'+prob.setter+'</span>';
            html+=pillH("q"+prob.qu,prob.qu>=7?"var(--grn)":prob.qu>=4?"var(--gold)":"var(--red)");
            html+=pillH("d"+prob.diff,"var(--blue)");
            if(prob.verified)html+=pillH("验✅","var(--grn)");
            else html+='<button class="btn verBtn'+(G.money<1000?' btn-dis':'')+'" data-tid="'+selT+'" data-idx="'+i+'" style="background:var(--orange);color:#000;padding:3px 8px;font-size:10px">🔍¥1k</button>';
            html+='<button class="btn unBtn" data-sid="'+prob.sid+'" data-tid="'+selT+'" data-idx="'+i+'" style="background:var(--red);color:#000;padding:3px 8px;font-size:10px">✕</button>';
          }else{
            var freeSetters=G.setters.filter(function(s){return s.used<s.cap});
            html+='<select class="inp assignSel" data-tid="'+selT+'" data-idx="'+i+'" style="width:auto;min-width:180px;text-align:left"><option value="">选择出题人...</option>';
            freeSetters.forEach(function(s){html+='<option value="'+s.id+'">'+s.nm+'(lv'+s.sk+'/q'+s.qu+')剩'+(s.cap-s.used)+'</option>'});html+='</select>'}
          html+='</div>'}
        html+='</div>'}
      html+='</div>'} // end detail
  }

  /* BRIDGES */
  if(tab==="bridges"){
    html+='<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:10px">🌉 桥梁</div>';
    if(bf){html+='<div class="card"><div style="margin-bottom:6px">从<b style="color:var(--acc)">'+(G.towers[bf]?G.towers[bf].name:'')+'</b>→</div><div class="flex">';
      tids.filter(function(id){return id!==bf&&!G.bridges.some(function(b){return b.from===bf&&b.to===id})}).forEach(function(id){html+='<button class="btn brToBtn" data-to="'+id+'" style="background:'+(TC[G.towers[id].tier]||'#888')+';color:#000">'+G.towers[id].name+'</button>'});
      html+='<button class="btn" id="brCancel" style="background:var(--red);color:#000">取消</button></div></div>'}
    else{html+='<div class="flex" style="margin-bottom:12px"><span style="font-size:11px;color:var(--dim)">起点:</span>';tids.forEach(function(id){html+='<button class="btn brFromBtn'+(G.ap<3?' btn-dis':'')+'" data-from="'+id+'" style="background:'+(TC[G.towers[id].tier]||'#888')+';color:#000">'+G.towers[id].name+'</button>'});html+='</div>'}
    if(G.bridges.length){html+='<div class="grid" style="gap:8px">';G.bridges.forEach(function(b){var ep=G.towers[b.to]?estP(G.towers[b.to],G.rep,G.bridges,G.towers):"?";
      html+='<div class="card"><div class="flex" style="margin-bottom:10px"><b style="color:var(--acc);font-size:13px">'+(G.towers[b.from]?G.towers[b.from].name:'')+'</b><span style="color:var(--dim)">→</span><b style="color:var(--gold);font-size:13px">'+(G.towers[b.to]?G.towers[b.to].name:'')+'</b>'+pillH("≈"+ep+"人","var(--blue)")+'</div><div class="flex" style="gap:20px"><label style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px">💰报名<input type="number" class="inp brInp" data-bid="'+b.id+'" data-key="price" value="'+b.price+'"></label><label style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px">📊通过率<input type="number" class="inp brInp" data-bid="'+b.id+'" data-key="pass" value="'+Math.round(b.pass*100)+'">%</label></div></div>'});html+='</div>'}
    else html+='<div style="color:var(--mut);font-size:11px">桥梁连接两塔。</div>'}

  /* SETTERS */
  if(tab==="setters"){
    html+='<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:6px">👤 出题人('+G.setters.length+')</div><div class="grid grid-auto" style="margin-bottom:14px">';
    G.setters.forEach(function(s){html+='<div class="card" style="padding:10px"><div style="font-weight:700;font-size:12px">'+s.nm+'</div><div style="font-size:10px;color:var(--dim)">lv'+s.sk+'·q'+s.qu+'·<b style="color:'+(s.used>=s.cap?'var(--red)':'var(--grn)')+'">'+s.used+'/'+s.cap+'</b></div></div>'});
    html+='</div><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px">📋 市场</div><div class="grid grid-auto">';
    G.market.forEach(function(s){html+='<div class="card" style="padding:10px"><div style="font-weight:700;font-size:12px">'+s.nm+'</div><div style="font-size:10px;color:var(--dim);margin-bottom:4px">lv'+s.sk+'·q'+s.qu+'·容量'+s.cap+'</div><button class="btn hireBtn'+(G.money<s.cost?' btn-dis':'')+'" data-sid="'+s.id+'" style="background:var(--grn);color:#000">¥'+s.cost+'</button></div>'});
    html+='</div>'}

  /* INSPECTORS */
  if(tab==="insp"){
    var repM=G.inspectors.reduce(function(s,x){return s+x.ab*.08+x.dil*.05},0);
    var compR=G.inspectors.reduce(function(s,x){return s+x.ab*.2},0);
    html+='<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:4px">🕵️ 特派员</div>';
    html+='<div class="flex" style="margin-bottom:10px;font-size:10px">'+pillH("月+"+repM.toFixed(2)+"声誉","var(--grn)")+pillH("赛后+"+compR.toFixed(1),"var(--blue)")+pillH("月薪¥"+iSal,"var(--red)")+'</div>';
    html+='<div class="grid grid-auto" style="margin-bottom:14px">';
    G.inspectors.forEach(function(ins){html+='<div class="card" style="padding:12px"><div class="flex" style="justify-content:space-between;margin-bottom:4px"><b>'+ins.nm+'</b><button class="btn fireBtn" data-iid="'+ins.id+'" style="background:var(--red);color:#000;padding:3px 8px;font-size:10px">解雇</button></div><div style="font-size:10px;color:var(--dim);margin-bottom:4px">'+ins.title+'</div><div class="flex">'+pillH("能力"+ins.ab,"var(--acc)")+pillH("尽职"+ins.dil,"var(--gold)")+pillH("¥"+ins.sal+"/月","var(--red)")+'</div></div>'});
    if(!G.inspectors.length)html+='<div style="color:var(--mut);padding:16px">无特派员</div>';
    html+='</div><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px">可招募</div><div class="grid grid-auto">';
    G.inspMkt.forEach(function(ins){html+='<div class="card" style="padding:12px"><div style="font-weight:700;margin-bottom:4px">'+ins.nm+' <span style="font-size:10px;color:var(--dim)">'+ins.title+'</span></div><div class="flex" style="margin-bottom:6px">'+pillH("能力"+ins.ab,"var(--acc)")+pillH("尽职"+ins.dil,"var(--gold)")+pillH("¥"+ins.sal+"/月","var(--red)")+'</div><button class="btn hireIBtn'+(G.money<ins.hire?' btn-dis':'')+'" data-iid="'+ins.id+'" style="background:var(--grn);color:#000">雇佣¥'+ins.hire+'</button></div>'});
    html+='</div>'}

  /* JUDGE */
  if(tab==="judge"){
    html+='<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:4px">⚙️ 评测机</div><div style="font-size:10px;color:var(--dim);margin-bottom:10px">维护费年增5%。当前<b style="color:var(--red)">¥'+jMnt+'/月</b></div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))">';
    JUDGES.forEach(function(j,i){var cur=i===G.jIdx,lk=i>G.jIdx+1,isN=i===G.jIdx+1;
      html+='<div class="card" style="padding:12px;border:2px solid '+(cur?'var(--acc)':isN?'rgba(255,194,68,.4)':'var(--bdr)')+';opacity:'+(lk?.3:1)+';position:relative;'+(cur?'background:rgba(0,221,179,.04)':'')+'">';
      if(cur)html+='<div style="position:absolute;top:6px;right:8px;background:var(--acc);color:#000;padding:1px 6px;border-radius:4px;font-size:8px;font-weight:800">当前</div>';
      html+='<div style="font-size:24px;margin-bottom:2px">'+j.e+'</div><div style="font-weight:800;font-size:13px;color:'+(cur?'var(--acc)':'var(--txt)')+'">'+j.name+'</div><div style="font-size:10px;color:var(--blue);margin-bottom:4px">'+j.mdl+'</div>';
      html+='<div class="flex" style="margin-bottom:4px">'+pillH("算力"+j.pow,"var(--blue)")+pillH("¥"+j.mnt+"/月","var(--red)")+'</div>';
      var canRun=COMPS.filter(function(c){return j.pow>=Math.ceil(c.tier*1.2)+1}).map(function(c){return c.name}).join(",");
      html+='<div style="font-size:9px;color:var(--dim);margin-bottom:4px">可运行: '+(canRun||"无")+'</div>';
      if(isN)html+='<button class="btn upJBtn'+(G.money<j.upg?' btn-dis':'')+'" style="background:var(--gold);color:#000">升级¥'+j.upg+'</button>';
      html+='</div>'});html+='</div>'}

  /* NEWS */
  if(tab==="news"){var news=genNews(G);html+='<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:10px">📰 新闻频道 · '+curYr+'年'+MO[curMo]+'</div><div class="grid" style="gap:8px">';
    news.forEach(function(n){html+='<div class="card news-card" style="border-left-color:'+n.c+';border-color:'+n.c+'20"><div class="flex" style="margin-bottom:6px"><span style="font-size:18px">'+n.icon+'</span><span style="font-weight:700;font-size:12px;color:'+n.c+'">'+n.t+'</span></div><div style="font-size:13px;line-height:1.7">'+n.m+'</div></div>'});
    if(!news.length)html+='<div style="color:var(--mut);padding:20px">暂无新闻</div>';html+='</div>'}

  /* HISTORY */
  if(tab==="hist"){
    if(!G.results.length)html+='<div style="color:var(--mut)">无记录</div>';
    else{html+='<div class="grid" style="gap:6px">';G.results.slice().reverse().forEach(function(r){
      html+='<div class="card" style="padding:10px"><div class="flex" style="justify-content:space-between;margin-bottom:4px"><b style="color:'+(TC[(G.towers[r.tid]?G.towers[r.tid].tier:0)]||'#888')+';font-size:12px">'+r.name+'</b><span style="font-size:10px;color:var(--dim)">'+r.yr+'年'+MO[r.mo%12]+'</span></div><div class="flex" style="font-size:11px"><span>'+r.part+'人</span><span style="color:'+(r.rev>=0?'var(--grn)':'var(--red)')+'">净¥'+r.rev+'</span><span style="color:'+(r.repCh>=0?'var(--grn)':'var(--red)')+'">誉'+(r.repCh>0?"+":"")+r.repCh+'</span></div>';
      if(r.tags&&r.tags.length)html+='<div style="margin-top:3px">'+r.tags.map(function(tg){return pillH("#"+(tg.idx+1)+tg.tag,"var(--red)")}).join("")+'</div>';
      html+='</div>'});html+='</div>'}}

  /* LOG */
  if(tab==="log"){html+='<div class="card" style="padding:10px;max-height:500px;overflow-y:auto">';G.log.slice().reverse().forEach(function(l){html+='<div style="padding:2px 0;border-bottom:1px solid rgba(28,34,64,.06);font-size:11px"><span style="color:var(--mut);margin-right:4px">['+l.yr+'·'+MO[(l.mo||0)%12]+']</span>'+l.msg+'</div>'});html+='</div>'}

  html+='</div>'; // main
  app.innerHTML=html;

  // EVENT BINDING
  bindAll()
}

function pillH(text,color){return '<span class="pill" style="background:'+color+'15;color:'+color+'">'+text+'</span>'}

function bindAll(){
  // header buttons
  var el;
  el=document.getElementById('logoBtn');if(el)el.onclick=function(){screen="menu";render()};
  el=document.getElementById('adv1');if(el)el.onclick=function(){advanceMonth()};
  el=document.getElementById('adv3');if(el)el.onclick=function(){for(var i=0;i<3;i++)advanceMonth()};
  el=document.getElementById('adv12');if(el)el.onclick=function(){for(var i=0;i<12;i++)advanceMonth()};
  el=document.getElementById('homeBtn');if(el)el.onclick=function(){resetGame()};

  // tabs
  document.querySelectorAll('.tabBtn').forEach(function(b){b.onclick=function(){tab=b.dataset.tab;render()}});

  // warnings
  document.querySelectorAll('.warngo').forEach(function(b){b.onclick=function(){tab="towers";selT=b.dataset.tid;render()}});

  // towers
  document.querySelectorAll('.unlockBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){var def=COMPS.find(function(d){return d.id===b.dataset.id});if(def)unlockTower(def)}});
  document.querySelectorAll('.towerCard').forEach(function(c){c.onclick=function(){selT=selT===c.dataset.id?null:c.dataset.id;pp=null;render()}});

  // tower detail inputs
  document.querySelectorAll('.twSel').forEach(function(s){s.onchange=function(){updTw(s.dataset.tid,s.dataset.key,parseInt(s.value))}});
  document.querySelectorAll('.twInp').forEach(function(inp){inp.onchange=function(){var v=parseInt(inp.value)||0;if(inp.dataset.key==="sites")v=cl(v,1,50);else if(inp.dataset.key==="regPrice")v=cl(v,0,9999);updTw(inp.dataset.tid,inp.dataset.key,v)}});

  // floor picker, problem panel buttons
  document.querySelectorAll('.fpBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();fp=b.dataset.tid;renderFloorPicker()}});
  document.querySelectorAll('.ppBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();pp=pp===b.dataset.tid?null:b.dataset.tid;render()}});
  document.querySelectorAll('.autoBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();doAutoAssign(b.dataset.tid)}});
  document.querySelectorAll('.trainBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(e){e.stopPropagation();doTrain(b.dataset.tid,b.dataset.q)}});
  document.querySelectorAll('.verBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(e){e.stopPropagation();doVerify(b.dataset.tid,parseInt(b.dataset.idx))}});
  document.querySelectorAll('.unBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();doUnassign(b.dataset.sid,b.dataset.tid,parseInt(b.dataset.idx))}});
  document.querySelectorAll('.assignSel').forEach(function(s){s.onchange=function(){if(s.value)doAssign(s.value,s.dataset.tid,parseInt(s.dataset.idx))}});

  // bridges
  document.querySelectorAll('.brFromBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){bf=b.dataset.from;render()}});
  document.querySelectorAll('.brToBtn').forEach(function(b){b.onclick=function(){doAddBridge(bf,b.dataset.to)}});
  el=document.getElementById('brCancel');if(el)el.onclick=function(){bf=null;render()};
  document.querySelectorAll('.brInp').forEach(function(inp){inp.onchange=function(){var v=parseInt(inp.value)||0;if(inp.dataset.key==="price")updBr(inp.dataset.bid,"price",cl(v,0,9999));else updBr(inp.dataset.bid,"pass",cl(v,1,100)/100)}});

  // setters
  document.querySelectorAll('.hireBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){var s=G.market.find(function(x){return x.id===b.dataset.sid});if(s)doHire(s)}});

  // inspectors
  document.querySelectorAll('.fireBtn').forEach(function(b){b.onclick=function(){doFireI(b.dataset.iid)}});
  document.querySelectorAll('.hireIBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){var ins=G.inspMkt.find(function(x){return x.id===b.dataset.iid});if(ins)doHireI(ins)}});

  // judge
  document.querySelectorAll('.upJBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){doUpJ()}});
}

function renderFloorPicker(){
  // remove existing modal
  var existing=document.querySelector('.modal-bg');if(existing)existing.remove();
  if(!fp||!G.towers[fp])return;
  var t=G.towers[fp];var eids=(t.floors||[]).map(function(f){return f.id});
  var modal=document.createElement('div');modal.className='modal-bg';
  var inner='<div class="modal">';
  inner+='<div class="flex" style="justify-content:space-between;margin-bottom:14px"><span style="font-size:15px;font-weight:800;color:var(--acc)">为'+t.name+'添加楼层</span><button class="btn fpClose" style="background:var(--red);color:#000">✕</button></div>';
  FCATS.forEach(function(cat){
    var floors=FLOORS.filter(function(f){return f.cat===cat.id});
    var hasCat=(t.floors||[]).some(function(f){return f.cat===cat.id});
    inner+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:'+cat.c+';margin-bottom:6px">'+cat.name+(cat.ex&&hasCat?' <span style="font-size:10px;color:var(--mut)">(互斥)</span>':'')+'</div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(190px,1fr))">';
    floors.forEach(function(f){
      var owned=eids.indexOf(f.id)>=0;var blocked=cat.ex&&hasCat;var dis=owned||blocked||G.ap<f.ap||G.money<f.cost;
      inner+='<div class="floorOpt'+(dis?' btn-dis':'')+'" data-fid="'+f.id+'" style="padding:8px;border-radius:8px;background:'+(dis?'var(--bg)':cat.c+'06')+';border:1px solid '+(dis?'var(--mut)':cat.c+'30')+';cursor:'+(dis?'not-allowed':'pointer')+';opacity:'+(dis?.3:1)+'"><div style="font-weight:700;font-size:11px;margin-bottom:2px">'+f.icon+' '+f.name+'</div><div style="font-size:10px;color:var(--dim);margin-bottom:2px">'+f.desc+'</div><div style="font-size:10px;color:'+cat.c+'">'+(f.ap>0?'AP'+f.ap+' ':'')+(f.cost>0?'¥'+f.cost:'')+((!f.ap&&!f.cost)?'免费':'')+'</div></div>'});
    inner+='</div></div>'});
  inner+='</div>';
  modal.innerHTML=inner;
  modal.onclick=function(e){if(e.target===modal){fp=null;modal.remove()}};
  document.body.appendChild(modal);

  modal.querySelector('.fpClose').onclick=function(){fp=null;modal.remove()};
  modal.querySelectorAll('.floorOpt:not(.btn-dis)').forEach(function(el){el.onclick=function(){
    var fd=FLOORS.find(function(f){return f.id===el.dataset.fid});if(fd){doAddFloor(fp,fd);modal.remove()}}});
}

/* ═══ INIT ═══ */
resetGame();
</script>
</body>
</html>
