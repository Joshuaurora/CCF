summary{list-style:none} summary::-webkit-details-marker{display:none}

function mkS(){var nm=SN[Ru(0,SN.length-1)]+Ru(10,99),sk=Ru(2,10),qu=Ru(2,10),cap=Ru(2,5);return{id:uid(),nm:nm,sk:sk,qu:qu,cap:cap,used:0,cost:Math.round((sk*150+qu*200+cap*120)*(.85+Math.random()*.3)),asgn:[]}}

function cSt(tw){
  var hangR=.15,timeM=1,solvB=0,repB=0,partM=1,diffM=0,extraP=0,hangM=1,repMul=1,moneyB=0;
  (tw.floors||[]).forEach(function(f){var e=f.fx||{};if(e.hangR!==undefined)hangR=e.hangR;if(e.timeM)timeM=e.timeM;if(e.solvB)solvB+=e.solvB;if(e.repB)repB+=e.repB;if(e.partM)partM*=e.partM;if(e.diffM)diffM+=e.diffM;if(e.extraP)extraP+=e.extraP;if(e.hangM)hangM*=e.hangM;if(e.repMul)repMul*=e.repMul;if(e.moneyB)moneyB+=e.moneyB});
  var def=getComp(tw.id);
  var specialBig=(tw.id==="noi"||tw.id==="camp"||tw.id==="team_camp"||tw.id==="ioi");

  return {hangR:hangR,timeM:timeM,solvB:solvB,repB:repB,partM:partM,diffM:diffM,extraP:extraP,hangM:hangM,repMul:repMul,moneyB:moneyB,totP:tw.bp+extraP,effD:cl(tw.bd+diffM,1,10),maxSites:def?def.maxSites:50,minLineTier:def?def.minLineTier:-1,unlockRep:def?def.unlockRep||0:0}

function priceParticipationMultiplier(fee){
  if(fee<=100) return cl(1+(100-fee)*0.0022,1,1.22);
  if(fee<=500) return cl(1-(fee-100)*0.00025,0.9,1.0);
  var mult=0.9*Math.exp(-(fee-500)/1500);
  return cl(mult,0.003,0.9)
}
function hasRequiredLine(tid,lines,matches){var def=getComp(tid);if(!def||def.minLineTier<0)return true;return lines.some(function(l){return l.to===tid&&matches[l.from]&&matches[l.from].tier>=def.minLineTier})}
function lineContinuityToNOI(matchId,lines,matches,visited){
  if(matchId==="noi") return true;
  visited=visited||{};
  if(visited[matchId]) return false;
  visited[matchId]=true;
  var nexts=lines.filter(function(l){return l.from===matchId}).map(function(l){return l.to});
  for(var i=0;i<nexts.length;i++){
    if(lineContinuityToNOI(nexts[i],lines,matches,Object.assign({},visited))) return true;
  }
  return false;
}
function progressionLineBonus(tid,lines,matches){
  var target=matches[tid];
  if(!target) return 1;
  var incoming=lines.filter(function(l){return l.to===tid&&matches[l.from]});
  if(!incoming.length) return 1;
  var best=1;
  incoming.forEach(function(line){
    var from=matches[line.from];
    var gap=target.tier-from.tier;
    var bonus=1;
    if(gap===1) bonus+=0.14;
    else if(gap===2) bonus+=0.11;
    else if(gap===3) bonus+=0.06;
    else bonus-=0.05;
    if(line.pass>=0.52&&line.pass<=0.72) bonus+=0.04;
    if(line.price>=60&&line.price<=140) bonus+=0.03;
    if(lineContinuityToNOI(line.from,lines,matches)) bonus+=0.03;
    best=Math.max(best,bonus);
  });
  return cl(best,0.9,1.21)
}
function lineDistancePenalty(lines,matches){
  if(lines.length<=1) return 1;
  var gaps=[];
  lines.forEach(function(l){if(matches[l.from]&&matches[l.to]) gaps.push(Math.abs(matches[l.to].tier-matches[l.from].tier))});
  if(!gaps.length) return 1;
  var avg=gaps.reduce(function(a,b){return a+b},0)/gaps.length;
  var variance=gaps.reduce(function(s,g){return s+(g-avg)*(g-avg)},0)/gaps.length;
  return cl(1-Math.min(0.12,variance*0.03),0.88,1)
}
function pathToNOIExistsFromAll(lines,matches){
  return Object.keys(matches).every(function(id){
    if(id==="camp") return true;
    return lineContinuityToNOI(id,lines,matches,{});

function estP(tw,rep,lines,matches){
  var st=cSt(tw),line=lines.find(function(l){return l.to===tw.id}),base;
  if(tw.tier<=1) base=Math.round(40*Math.pow(1.045,rep)-st.effD*3);
  else if(line){var fr=matches[line.from],lp=(fr&&fr.lastResult)?fr.lastResult.part:Math.round(20*Math.pow(1.03,rep));base=Math.round(lp*line.pass);if(fr&&fr.suspended)base=Math.round(base*.3)}
  else base=Math.round(15*Math.pow(1.035,rep)-st.effD*2);

  var fee=line?line.price:(tw.regPrice||50),pe=priceParticipationMultiplier(fee),lineBonus=progressionLineBonus(tw.id,lines,matches),coherence=lineDistancePenalty(lines,matches);
  var cap=(tw.id==="noi"||tw.id==="camp"||tw.id==="team_camp")?400:1e9;
  return Math.max(5,Math.min(cap,Math.round(base*pe*lineBonus*coherence*st.partM*(1+((tw.sites||1)-1)*.15))))
}

  document.querySelectorAll('.unlockBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){var def=COMPS.find(function(d){return d.id===b.dataset.id});if(def)unlockTower(def)}});

  document.querySelectorAll('.twSel').forEach(function(s){s.onchange=function(){updTw(s.dataset.tid,s.dataset.key,parseInt(s.value))}});
  document.querySelectorAll('.twInp').forEach(function(inp){inp.onchange=function(){var v=parseInt(inp.value)||0;if(inp.dataset.key==='sites')v=cl(v,1,cSt(G.towers[inp.dataset.tid]).maxSites);else if(inp.dataset.key==='regPrice')v=cl(v,0,9999);updTw(inp.dataset.tid,inp.dataset.key,v)}});
  document.querySelectorAll('.fpBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();fp=b.dataset.tid;renderFloorPicker()}});
  document.querySelectorAll('.ppBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();pp=pp===b.dataset.tid?null:b.dataset.tid;render()}});
  document.querySelectorAll('.autoBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();doAutoAssign(b.dataset.tid)}});
  document.querySelectorAll('.trainBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(e){e.stopPropagation();doTrain(b.dataset.tid,b.dataset.q)}});
  document.querySelectorAll('.verBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(e){e.stopPropagation();doVerify(b.dataset.tid,parseInt(b.dataset.idx))}});
  document.querySelectorAll('.unBtn').forEach(function(b){b.onclick=function(e){e.stopPropagation();doUnassign(b.dataset.sid,b.dataset.tid,parseInt(b.dataset.idx))}});
  document.querySelectorAll('.assignSel').forEach(function(s){s.onchange=function(){if(s.value)doAssign(s.value,s.dataset.tid,parseInt(s.dataset.idx))}});
  document.querySelectorAll('.brFromBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){bf=b.dataset.from;render()}});
  document.querySelectorAll('.brToBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){doAddLine(bf,b.dataset.to)}});
  el=document.getElementById('brCancel');if(el)el.onclick=function(){bf=null;render()};
  document.querySelectorAll('.brInp').forEach(function(inp){inp.onchange=function(){var v=parseInt(inp.value)||0;if(inp.dataset.key==='price')updLine(inp.dataset.bid,'price',cl(v,0,9999));else updLine(inp.dataset.bid,'pass',cl(v,1,100)/100)}});
  document.querySelectorAll('.delBridgeBtn').forEach(function(b){b.onclick=function(){delLine(b.dataset.bid)}});
  document.querySelectorAll('.hireBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){var s=G.market.find(function(x){return x.id===b.dataset.sid});if(s)doHire(s)}});
  document.querySelectorAll('.fireBtn').forEach(function(b){b.onclick=function(){doFireI(b.dataset.iid)}});
  document.querySelectorAll('.hireIBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){var ins=G.inspMkt.find(function(x){return x.id===b.dataset.iid});if(ins)doHireI(ins)}});
  document.querySelectorAll('.upJBtn:not(.btn-dis)').forEach(function(b){b.onclick=function(){doUpJ()}});
}
function renderFloorPicker(){
  var existing=document.querySelector('.modal-bg');if(existing)existing.remove();if(!fp||!G.towers[fp])return;
  var t=G.towers[fp],eids=(t.floors||[]).map(function(f){return f.id}),modal=document.createElement('div');modal.className='modal-bg';
  var inner='<div class="modal"><div class="flex" style="justify-content:space-between;margin-bottom:16px"><span style="font-size:18px;font-weight:900;color:var(--acc)">为 '+t.name+' 添加楼层</span><button class="btn fpClose" style="background:var(--red);color:#000">关闭</button></div>';
  FCATS.forEach(function(cat){var floors=FLOORS.filter(function(f){return f.cat===cat.id}),hasCat=(t.floors||[]).some(function(f){return f.cat===cat.id});inner+='<div style="margin-bottom:16px"><div style="font-size:15px;font-weight:900;color:'+cat.c+';margin-bottom:8px">'+cat.name+(cat.ex&&hasCat?' <span style="font-size:12px;color:var(--dim)">（本类互斥）</span>':'')+'</div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">';floors.forEach(function(f){var owned=eids.indexOf(f.id)>=0,blocked=cat.ex&&hasCat,dis=owned||blocked||G.ap<f.ap||G.money<f.cost;inner+='<div class="floorOpt'+(dis?' btn-dis':'')+'" data-fid="'+f.id+'" style="padding:10px;border-radius:12px;background:'+(dis?'var(--bg2)':cat.c+'08')+';border:1px solid '+(dis?'var(--line)':cat.c+'30')+';cursor:'+(dis?'not-allowed':'pointer')+';opacity:'+(dis?.35:1)+'"><div style="font-weight:900;font-size:13px;margin-bottom:3px">'+f.icon+' '+f.name+'</div><div style="font-size:12px;color:var(--dim);margin-bottom:4px">'+f.desc+'</div><div style="font-size:12px;color:var(--gold);margin-bottom:4px">'+f.formal+'</div><div style="font-size:12px;color:'+cat.c+'">'+(f.ap>0?'AP '+f.ap+' ':'')+(f.cost>0?'¥'+f.cost:'')+((!f.ap&&!f.cost)?'免费':'')+'</div></div>'});inner+='</div></div>'});inner+='</div>';
  modal.innerHTML=inner;modal.onclick=function(e){if(e.target===modal){fp=null;modal.remove()}};document.body.appendChild(modal);
  modal.querySelector('.fpClose').onclick=function(){fp=null;modal.remove()};
  modal.querySelectorAll('.floorOpt:not(.btn-dis)').forEach(function(el){el.onclick=function(){var fd=FLOORS.find(function(f){return f.id===el.dataset.fid});if(fd){doAddFloor(fp,fd);modal.remove()}}})
}
resetGame();
</script>
</body>
